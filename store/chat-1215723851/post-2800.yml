    животные становятся политическими субъектами: политический поворот в этике животных»</b></a>


    Исследования животных как междисциплинарная область сформировались в 1970-е годы
    и объединили философию, социологию, историю, гуманитарные науки и биологию.

    Их общий вопрос — как по-новому мыслить животных и отношения между человеком и
    нечеловеческим.


    В последние десятилетия в этом поле, прежде всего в этике животных, намечается
    <b>политический поворот</b> — реакция на усталость от прежних моральных дискуссий
    и осознание их теоретического тупика.


    Фокус смещается от абстрактных аргументов к анализу <b>политических взаимодействий
    людей и животных</b>: устойчивых практик, отношений, институтов и структур власти.


    Задача этого поворота — понять, <i>что именно</i> в этих взаимодействиях проблематично
    и какие реформы возможны не только на уровне теории, но и в реальной практике.

    <b>Прослушав курс, вы узнаете:</b>

    <tg-emoji emoji-id="5415594563551111038">🔘</tg-emoji>ключевые идеи политического
    поворота в этике животных;

    <tg-emoji emoji-id="5415594563551111038">🔘</tg-emoji>как учитывать интересы животных
    на уровне ежедневных взаимодействиях с ними и политических институтов;

    <tg-emoji emoji-id="5415594563551111038">🔘</tg-emoji>почему мы должны смотреть
    на животных как на политических акторов;

    <tg-emoji emoji-id="5415594563551111038">🔘</tg-emoji>какие формы ответственности
    возникают у людей в условиях неизбежной межвидовой взаимозависимости.

    <b>Пять причин послушать курс:</b>

