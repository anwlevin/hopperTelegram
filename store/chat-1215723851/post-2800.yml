  caption: '🌟🌟🌟 дорогие коллеги, у нас рекомендация: любимый лекторий «Симпосий» приглашает
    на курс Марка Мефёд «Когда животные становятся политическими субъектами: политический
    поворот в этике животных»


    Исследования животных как междисциплинарная область сформировались в 1970-е годы
    и объединили философию, социологию, историю, гуманитарные науки и биологию.

    Их общий вопрос — как по-новому мыслить животных и отношения между человеком и
    нечеловеческим.


    В последние десятилетия в этом поле, прежде всего в этике животных, намечается
    политический поворот — реакция на усталость от прежних моральных дискуссий и осознание
    их теоретического тупика.


    Фокус смещается от абстрактных аргументов к анализу политических взаимодействий
    людей и животных: устойчивых практик, отношений, институтов и структур власти.


    Задача этого поворота — понять, что именно в этих взаимодействиях проблематично
    и какие реформы возможны не только на уровне теории, но и в реальной практике.

    Прослушав курс, вы узнаете:

    🔘ключевые идеи политического поворота в этике животных;

    🔘как учитывать интересы животных на уровне ежедневных взаимодействиях с ними и
    политических институтов;

    🔘почему мы должны смотреть на животных как на политических акторов;

    🔘какие формы ответственности возникают у людей в условиях неизбежной межвидовой
    взаимозависимости.

    Пять причин послушать курс:

    🔘 вас интересует роль и место человека в мире;

    🔘 вы хотите узнать, каким может быть мир через 10-20 лет;

    🔘 вам интересны животные, и вы хотите больше понимать, что можно для них сделать;

    🔘 вас интересует справедливая правовая система;

    🔘 вы хотите осваивать новые области гуманитарного знания, знакомиться с незнакомыми
    ранее именами и теориями



    Старт 19 марта

    12 встреч | Онлайн | 18+

    Записи останутся у вас


    🐀 Подробнее о курсе и регистрация — здесь 🐀'
