  caption: "Советы Карла Ясперса о том, как заниматься философией \n\n→ Собрали 6\
    \ советов из книги Ясперса «Введение в философию», которая вышла в 1953 году и\
    \ была основана на расшифровке его радиодокладов, в которых Ясперс доступно и\
    \ подробно описывает своё понимание философии. \n \n1. Не приписывать себя окончательно\
    \ ни к одной из философских школ, не считать ни одну из высказываемых истин исключительной\
    \ и единственной, стать господином своих мыслей.\n\n2. Не накапливать, как на\
    \ складе, то, чем владеет философия, но углублять философствование как движение.\n\
    \n3. Бороться за истину и человечность в ничем не обусловленной коммуникации.\n\
    \n4. Обрести способность через усвоение учиться у прошлого, слышать современников,\
    \ быть открытым для всех возможностей.\n\n5. В качестве отдельного, единичного\
    \ человека погрузиться в собственную историчность, в свое происхождение, в то,\
    \ что я сделал; взять на себя то, чем я был и стал и что мне даровано.\n\n6. Непрестанно\
    \ врастать через собственную историчность в историчность человеческого бытия в\
    \ целом, вступая тем самым в мировое гражданство."
