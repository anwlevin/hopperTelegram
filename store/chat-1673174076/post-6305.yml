    \ и подробно описывает своё понимание философии. \n</i> \n1. Не приписывать себя\
    \ окончательно ни к одной из философских школ, не считать ни одну из высказываемых\
    \ истин исключительной и единственной, стать господином своих мыслей.\n\n2. Не\
    \ накапливать, как на складе, то, чем владеет философия, но углублять философствование\
    \ как движение.\n\n3. Бороться за истину и человечность в ничем не обусловленной\
