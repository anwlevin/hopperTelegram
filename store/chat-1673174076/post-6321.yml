  caption: 'Finally, unsupervised learning forces the model to “explain” the high-dimensional
    inputs, rather

    than just the low-dimensional outputs. This allows us to learn richer models of
    “how the world works”.

    As Geoﬀ Hinton, who is a famous professor of ML at the University of Toronto,
    has said:

    When we’re learning to see, nobody’s telling us what the right answers are — we
    just look.

    Every so often, your mother says “that’s a dog”, but that’s very little information.
    You’d be

    lucky if you got a few bits of information — even one bit per second — that way.
    The brain’s

    visual system has 1014 neural connections. And you only live for 109 seconds.
    So it’s no use

    learning one bit per second. You need more like 105 bits per second. And there’s
    only one place

    you can get that much information: from the input itself. — Geoﬀrey Hinton, 1996
    (quoted in

    [Gor06]).'
