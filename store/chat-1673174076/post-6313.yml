  text: '1. John Muir, 1869


    «Когда мы пытаемся выделить что-либо отдельно, мы обнаруживаем, что оно крепко
    связано тысячью невидимых нитей, которые невозможно разорвать, со всем во Вселенной.»


    2. James Clerk Maxwell, 1850


    «Настоящая наука логики в настоящее время имеет дело только с вещами, которые
    либо достоверны, либо невозможны, либо полностью сомнительны… Следовательно, истинная
    логика для этого мира — это исчисление вероятностей, которое учитывает величину
    вероятности, существующей или которой следует быть в уме разумного человека.»


    3. Pierre Simon Laplace, 1819


    «Теория вероятностей по сути своей — это всего лишь здравый смысл, сведённый к
    исчислению; она позволяет нам точно оценивать то, что точные умы ощущают как бы
    инстинктивно, зачастую не в состоянии объяснить это рационально.»


    4. Stephen Jay Gould


    «Непонимание вероятности может быть самым большим препятствием на пути к научной
    грамотности.»'
