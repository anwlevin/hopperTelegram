  caption: "Кант был мастером бильярда \n\n→ И даже иногда зарабатывал на этом деньги.\
    \ Вспоминает друг Канта, Кристоф Гейльсберг:\n\nОн отдыхал, только играя в бильярд.\
    \ Мы были в этом его постоянными спутниками. Мы достигли высот игры и редко уходили\
    \ домой, не выиграв. Я оплачивал учителя по французскому практически полностью\
    \ из этих денег. Когда с нами больше никто не хотел играть, поскольку мы всегда\
    \ выигрывали, мы полностью оставили этот источник дохода и перешли на ломбер,\
    \ в который Кант хорошо играл.\n\nЕще Кант одобрял карты, пишет биограф Канта\
    \ Манфред Кюн:  \n\nВ одной из лекций по антропологии Канта утверждает, что игра\
    \ в карты «обучает нас, делает нас уравновешенными, учит держать чувства под контролем.\
    \ В этом смысле они могут иметь влияние. на нашу нравственность». Кант был бы\
    \ хорошим игроком в покер."
