  text_html: "<b>Как Борис Пастернак мог стать немецким философом\n</b>\n<i>→ После\
    \ отказа от карьеры композитора Пастернак решил заняться философией и уехал в\
    \ Германию — в Марбургский университет. \n</i>\nВ то время там были популярны\
    \ неокантианцы во главе со знаменитым Германом Когеном. Пастернак стал заниматься\
    \ философией, и довольно успешно. Один раз его даже пригласил на обед сам Коген\
    \ — это считалось высшей похвалой и означало, что Коген видит в Пастернаке будущего\
    \ преподавателя философии и ученого. \n\nОднако Пастернак отказался от приглашения,\
    \ а затем и от карьеры в университете. Пастернак уехал из Марбурга, на отлично\
    \ досдал экзамены в Московском университете, но вот за своим красным дипломом\
    \ так и не пришёл — он до сих пор хранится в архивах. \n\nПастернак говорил, что\
    \ причиной его отказа от философии стал слишком стерильный характер философии\
    \ того времени — силами разума она была очищена от жизни и чувств.  \n \nВот цитата\
    \ Пастернака по этому поводу, напоминающая то, что потом Делез и Гваттари назовут\
    \ «ризомой»: \n\nЯ переживал изученье науки сильнее, чем это требуется предметом.\
    \ Какое-то растительное мышленье сидело во мне. Его особенностью было то, что\
    \ любое второстепенное понятье, безмерно развертываясь в моем толкованьи, начинало\
    \ требовать для себя пищи и ухода."
